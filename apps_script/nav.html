<script>
  (function () {
    const active = document.querySelector('.topnav').dataset.active;
    document.querySelectorAll('.topnav-links a').forEach(a => {
      if (a.dataset.page === active) a.classList.add('active');
      a.addEventListener('click', e => {
        e.preventDefault();
        const href = a.getAttribute('href');
        try { top.location.href = href; }
        catch (err) { window.open(href, '_top'); }
      });
    });
  })();
</script>
